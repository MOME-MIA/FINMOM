<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <!-- Multiple ellipses rotated to form a 3D torus / vortex -->
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#ring)" stroke-width="2.5" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#ring)" stroke-width="2.5" transform="rotate(60)" />
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#ring)" stroke-width="2.5" transform="rotate(120)" />
    <!-- Bright Central Core -->
    <circle cx="0" cy="0" r="5" fill="#ffffff" />
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.3" filter="blur(2px)" />
  </g>
</svg>
