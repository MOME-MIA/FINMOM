name: CI/CD Pipeline
on:
  push:
    branches: [ "DEV", "PROD" ]
  pull_request:
    branches: [ "DEV", "PROD" ]

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Build Next.js Application
        run: npm run build
        env:
          NEXT_PUBLIC_INSFORGE_URL: ${{ secrets.NEXT_PUBLIC_INSFORGE_URL }}
          NEXT_PUBLIC_INSFORGE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_INSFORGE_ANON_KEY }}
